# AdvancedChat - Archivo de Idioma Español

prefix: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> "

general:
  no-permission: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red>No tienes permiso para hacer eso."
