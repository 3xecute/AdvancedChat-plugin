  console-only: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red>Este comando solo puede ser usado por jugadores."

chat:
  muted: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red>¡Estás silenciado! Expira en: <yellow>{expiry}"
