# AdvancedChat - English Language File
# Supports MiniMessage (<red>, <gradient:#ff0000:#ffff00>) and Legacy (&c, &l)

prefix: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> "

general:
  no-permission: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red>You do not have permission to do that."
  player-not-found: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red>Player not found or is offline."
  reload-success: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <green>AdvancedChat has been reloaded successfully."
  console-only: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red>This command can only be used by players."

chat:
  muted: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red>You are muted! Expires in: <yellow>{expiry}"
  muted-reason: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red>You are muted! Reason: <yellow>{reason} <red>| Expires: <yellow>{expiry}"
  spam-warning: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red>Please do not send the same message repeatedly!"
  slowmode-warning: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red>Slow down! Please wait <yellow>{seconds}s</yellow> before sending another message."
  global-disabled: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red>Global chat is currently disabled."
  local-disabled: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red>Local chat is currently disabled."
  nobody-hearing-local: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <gray>No one is nearby, no one can hear you."
  nobody-hearing-global: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <gray>No one else is online, no one can hear you."
  nobody-hearing-staff: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <gray>No other staff members are online."
  nobody-hearing-owner: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <gray>No other owners are online."
  channel-switched-global: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <gray>Channel: <white>Global Chat"
  channel-switched-local: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <gray>Channel: <white>Local Chat"
  channel-switched-staff: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <gray>Channel: <white>Staff Chat"
  channel-switched-owner: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <gray>Channel: <white>Owner Chat"

  cleared: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <gray>Chat was cleared by <white>{staff}</white>."
  caps-lowered: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <yellow>Your message was converted to lowercase."
  caps-blocked: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red>Please don't use excessive capital letters."
punishment:
  default-mute-reason: "Inappropriate language"
  default-ban-reason: "Rule violation"
  default-kick-reason: "You have been kicked"

  mute-success: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <green>{player} has been muted. Duration: <white>{duration}"
  ban-success: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <green>{player} has been banned. Duration: <white>{duration}"
  kick-success: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <green>{player} has been kicked."
  unmute-success: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <green>{player} has been unmuted."
  unban-success: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <green>{player} has been unbanned."
  unmute-notify: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <green>You have been unmuted."
  not-muted: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red>{player} is not muted."
  not-banned: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red>{player} is not banned."

  banned-screen: |-
    <gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red><bold>You are banned!</bold>
    <gray>Reason: <white>{reason}
    <gray>Expires: <white>{expiry}

  muted-screen: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red>You are muted! Expires: <yellow>{expiry}"
  kick-screen: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red>{reason}"

filter:
  blocked: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red>Your message was blocked due to inappropriate content."
  replaced: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <yellow>Part of your message was filtered."
  warned: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <yellow>Warning: Please watch your language."
  warn-muted: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red>You have been automatically muted for {duration} due to inappropriate language."
  auto-mute-reason: "Automatic filter violation"

spy:
  enabled: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <green>Chat Spy <bold>enabled</bold>. You can now see all channels."
  disabled: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red>Chat Spy <bold>disabled</bold>."

mention:
  notified: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <yellow>✦ <white>{player} <yellow>mentioned you!"
  toggle-on: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <green>Mention notifications enabled."
  toggle-off: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red>Mention notifications disabled."

color:
  selected: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <green>Chat color set to: {color}"
  reset: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <gray>Chat color reset to default."

help:
  title: "Commands"
  legend: "<> = Required  [] = Optional"
  # Player commands
  cmd-global: "Switch to / send message in Global chat"
  cmd-local: "Switch to / send message in Local chat"
  cmd-mention-on: "Enable mention notifications"
  cmd-mention-off: "Disable mention notifications"
  cmd-mention-toggle: "Toggle mention notifications"
  cmd-acolor: "Choose chat color"
  # Staff section
  staff-title: "— Staff Commands —"
  cmd-sc: "Switch to / send message in Staff chat"
  cmd-oc: "Switch to / send message in Owner chat"
  cmd-chatspy: "Monitor all channels"
  # Admin section
  admin-title: "— Admin Commands —"
  cmd-reload: "Reload the plugin"
  cmd-info: "Plugin information"
  # Info panel
  info-title: "Plugin Info"
  info-version: "Version"
  info-author: "Author"
  info-api: "API"
  # Reload
  reload-done: "Plugin successfully <bold>reloaded</bold><green>."
gui:
  # Staff Menu
  staff-menu-title: "<dark_gray>» <gradient:#ff6b6b:#ffd93d>Staff Menu</gradient> <dark_gray>«"
  staff-menu-warn: "<gradient:#FFD700:#FF8C00><bold>⚠ Warn</bold></gradient>"
  staff-menu-warn-lore1: "<gray>Send a written warning to the player."
  staff-menu-warn-lore2: "<gray>Warnings are logged."
  staff-menu-mute: "<yellow><bold>⊘ Mute</bold></yellow>"
  staff-menu-mute-lore1: "<gray>Prevent the player from chatting."
  staff-menu-mute-lore2: "<yellow>▶ Click to choose duration"
  staff-menu-ban: "<red><bold>✖ Ban</bold></red>"
  staff-menu-ban-lore1: "<gray>Ban the player from the server."
  staff-menu-ban-lore2: "<red>▶ Click to choose duration"
  staff-menu-kick: "<gold><bold>⇥ Kick</bold></gold>"
  staff-menu-kick-lore1: "<gray>Kick the player from the server."
  staff-menu-kick-lore2: "<gold>▶ Click"
  staff-menu-freeze: "<aqua><bold>❄ Freeze</bold></aqua>"
  staff-menu-freeze-lore1: "<gray>Freeze the player's movement."
  staff-menu-freeze-lore2: "<gray>Cannot chat or move."
  staff-menu-freeze-lore3: "<aqua>▶ Click"
  staff-menu-unfreeze: "<aqua><bold>❄ Unfreeze</bold></aqua>"
  staff-menu-unfreeze-lore1: "<gray>Player is currently <aqua>frozen<gray>."
  staff-menu-unfreeze-lore2: "<gray>Click to unfreeze."
  staff-menu-unfreeze-lore3: "<aqua>▶ Click to unfreeze"
  staff-menu-msghistory: "<gradient:#00c6ff:#0072ff><bold>✉ Message History</bold></gradient>"
  staff-menu-msghistory-lore1: "<gray>View last 20 messages of player."
  staff-menu-msghistory-lore2: "<aqua>▶ Click"
  staff-menu-notes: "<gradient:#a855f7:#6366f1><bold>✎ Notes</bold></gradient>"
  staff-menu-notes-lore1: "<gray>Add/view hidden notes for player."
  staff-menu-notes-lore2: "<gray>Only staff can see these."
  staff-menu-notes-lore3: "<light_purple>▶ Click"
  staff-menu-history: "<gradient:#b39ddb:#7c4dff><bold>✦ Punishment History</bold></gradient>"
  staff-menu-history-lore1: "<gray>View all punishments of player."
  staff-menu-history-lore2: "<light_purple>▶ Click"
  staff-menu-inventory: "<aqua><bold>⊞ Inventory</bold></aqua>"
  staff-menu-inventory-lore1: "<gray>View player's inventory."
  staff-menu-inventory-lore2: "<aqua>▶ Click"
  staff-head-uuid: "<gray>UUID  : <white>"
  staff-head-ping: "<gray>Ping  : <aqua>"
  staff-head-world: "<gray>World : <white>"
  staff-head-warns: "<gray>Warns : "
  staff-head-notes: "<gray>Notes : <white>"
  staff-head-status: "<gray>Status: "
  staff-head-frozen: "<aqua>❄ Frozen"
  staff-head-normal: "<green>✓ Normal"
  click: "<yellow>▶ Click"
  back: "<gray>← Back"

  # Warn GUI
  warn-title: "<dark_gray>» <gradient:#FFD700:#FF8C00>Warn — {player}</gradient> <dark_gray>«"
  warn-total: "<gray>Total Warns: "
  warn-head-lore: "<gray>Select a reason to warn the player"
  warn-reason-lore1: "<gray>Warn the player with this reason"
  warn-reason-lore2: "<yellow>▶ Click"
  warn-no-history: "<gray>No warn history"
  warn-item-title: "<yellow>#{no} Warning"
  warn-item-reason: "<gray>Reason : <white>"
  warn-item-staff: "<gray>Staff  : <white>"
  warn-item-date: "<gray>Date   : <white>"
  warn-clear-title: "<red><bold>Clear All Warns"
  warn-clear-lore1: "<gray>Total: <white>{count} warns"
  warn-clear-lore2: "<red>▶ Click"
  warn-reasons: "Profanity,Spam,Advertising,Harassment,Rule Violation"

  # Note GUI
  note-title: "<dark_gray>» <gradient:#a855f7:#6366f1>Notes — {player}</gradient> <dark_gray>«"
  note-no-notes: "<gray>No notes yet"
  note-item-title: "<gradient:#a855f7:#6366f1>Note #{no}"
  note-item-by: "<gray>By   : <white>"
  note-item-date: "<gray>Date  : <white>"
  note-item-delete: "<red>⇧ Shift+Click → Delete"
  note-add-title: "<gradient:#a855f7:#6366f1><bold>+ Add Note</bold></gradient>"
  note-add-lore1: "<gray>Add a hidden note to this player"
  note-add-lore2: "<gray>Type /note <text> in chat"
  note-add-lore3: "<light_purple>▶ Click → type in chat"

  # Message History GUI
  msghistory-title: "<dark_gray>» <gradient:#00c6ff:#0072ff>Message History — {player}</gradient> <dark_gray>«"
  msghistory-empty-title: "<gray>No message history found"
  msghistory-empty-lore: "<dark_gray>No messages sent this session."
  msghistory-time: "<gray>Time: <white>"

  # History GUI (punishments)
  history-no-records: "<gray>No punishment history"
  history-prev: "<gray>← Previous"
  history-next: "<gray>Next →"
  history-instant: "Instant"
  history-active: "<green>Active"
  history-inactive: "<dark_gray>Inactive"
  history-reason: "<gray>Reason: <white>"
  history-staff: "<gray>Staff: <white>"
  history-date: "<gray>Date: <white>"
  history-duration: "<gray>Duration: <white>"
  history-status: "<gray>Status: "

# Moderation messages (from GUIListener / ChatListener)
moderation:
  freeze-target: "<aqua>❄ You have been frozen! You cannot move."
  freeze-staff: "<green>{player} has been frozen."
  unfreeze-target: "<green>✓ You have been unfrozen! You can move again."
  unfreeze-staff: "<green>{player} has been unfrozen."
  warn-cleared: "<green>{player}'s warnings have been cleared."
  warn-sent-target: "<yellow>⚠ <white>{staff} <yellow>has warned you. <gray>Reason: <white>{reason}"
  warn-sent-staff: "<green>{player} has been warned. <gray>Reason: <white>{reason}"
  warn-total: "<gray>Total warns: <white>{count}"
  note-deleted: "<green>Note deleted."
  note-cancelled: "<gray>Note adding cancelled."
  note-input-prompt: "<light_purple>Type the note in chat. <gray>Cancel: <white>/note cancel"
  note-saved: "<green>Note saved."

msg:
  format-out: "<dark_gray>[<light_purple>PM</light_purple>]</dark_gray> <gray>You → <white>{target}</white>: <light_purple>{message}"
  format-in:  "<dark_gray>[<light_purple>PM</light_purple>]</dark_gray> <gray><white>{sender}</white> → You: <light_purple>{message}"
  format-spy: "<dark_gray>[<yellow>SPY-PM</yellow>]</dark_gray> <gray>{sender} → {target}: <white>{message}"
  no-reply-target: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red>No one to reply to."
  target-offline: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red>That player is offline."
  self-message: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red>You cannot message yourself."
  usage: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <gray>Usage: <white>/msg <player> <message></white>"
  usage-reply: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <gray>Usage: <white>/r <message></white>"

stafflist:
  header: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <gray>Online Staff:"
  entry:  "  <dark_gray>▸</dark_gray> <aqua>{staff}</aqua>"
  footer: "<dark_gray>────────────────</dark_gray> <gray>Total: <white>{count}</white>"
  none:   "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <gray>No staff online at the moment."

report:
  sent:         "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <green>Your report against <white>{target}</white> has been sent."
  staff-notify: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red>[REPORT]</red> <white>{reporter}</white> reported <yellow>{target}</yellow>: <gray>{reason}"
  cooldown:     "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red>Please wait {seconds}s before reporting again."
  self:         "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <red>You cannot report yourself."
  usage:         "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <gray>Usage: <white>/report <player> <reason></white>"
  list-empty: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <gray>No reports found."
  cleared-all: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <green>Cleared <white>{count}</white> reports."
  cleared-player: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <green>Cleared <white>{count}</white> reports for <yellow>{player}</yellow>."
unmute:
  usage: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <gray>Usage: <white>/unmute <player></white>"

unban:
  usage: "<gradient:#FF8C00:#FFD700><bold>AChat</bold></gradient> <dark_gray>»</dark_gray> <gray>Usage: <white>/unban <player></white>"