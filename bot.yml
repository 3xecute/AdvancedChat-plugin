# AdvancedChat - Chat Bot Configuration
# bot-message: true  → bot aktif
# bot-message: false → bot devre dışı

bot-message: true

# Aktif oyun modu: survival | skyblock | factions | prison | rpg | default
gamemode: default

# Botun görünen ismi
bot-name: "Assistant"

# Botun prefix'i (MiniMessage destekli)
bot-prefix: "<dark_gray>[<gradient:#FF8C00:#FFD700>BOT</gradient>]</dark_gray>"

# Aynı oyuncuya kaç saniyede bir cevap versin
cooldown-seconds: 3

# Hiçbir kural eşleşmezse bu cevap verilir (boş bırakırsan sessiz kalır)
default-response: "<gray>Bu konuda yardımcı olamıyorum. Yardım için <yellow>/help</yellow> yazabilirsin."

# ─────────────────────────────────────────────────────────────────────────────
# OYUN MODLARI — TR / EN / ES keyword desteği
# keywords: mesajda geçmesi yeterli (exact-match: false)
# exact-match: true → mesajın tamamen eşleşmesi gerekir
# {player} → mesajı yazan oyuncunun adı
# ─────────────────────────────────────────────────────────────────────────────

